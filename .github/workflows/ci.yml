name: CI

on:
  pull_request: {}
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
        include:
          # macOS: one modern Python is enough — first macOS CI coverage for the
          # experimental macOS support, and exercises the real security(1) Keychain
          # integration test.
          - os: macos-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install -r requirements-dev.txt
          python -m pip install pytest

      - name: Compile
        run: python -m compileall -q src/tokdash main.py docs/guides/agents/openclaw_reporting/openclaw_cron_job.py

      - name: Test
        run: pytest -q
