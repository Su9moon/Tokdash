<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tokdash · 项目与工单</title><link rel="stylesheet" href="/static/themes.css">
<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--card:#fff;--bg:#f8fafc;--accent:#2563eb}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif}header{padding:24px max(24px,calc((100vw - 1280px)/2));background:#fff;border-bottom:1px solid var(--line)}main{max-width:1280px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center}.back{color:var(--accent);text-decoration:none}.hint{color:var(--muted);margin:4px 0 0}.grid{display:grid;grid-template-columns:300px minmax(0,1fr);gap:20px;margin-top:20px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}.project{width:100%;text-align:left;border:0;background:transparent;padding:12px;border-radius:8px;cursor:pointer}.project:hover,.project.active{background:#eff6ff}.metric{font-size:20px;font-weight:700}.meta{color:var(--muted);font-size:12px}.flow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.step{border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px}.step.done{background:#ecfdf5;border-color:#a7f3d0}.step.progress{background:#fff7ed;border-color:#fed7aa}table{width:100%;border-collapse:collapse}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:12px;color:var(--muted)}.empty{color:var(--muted);padding:28px;text-align:center}@media(max-width:760px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}table{font-size:12px}}
</style></head><body><header><div class="top"><div><a class="back" href="/">← 返回 Tokdash</a><h1>项目 / 工单</h1><p class="hint">项目文件提供业务流程与工单；Tokdash 提供会话级实测 Token 和成本。</p></div><button id="refresh">刷新</button></div></header><main><div id="root" class="grid"><aside class="card"><div class="empty">正在读取项目…</div></aside><section class="card"><div class="empty">选择项目查看详情</div></section></div></main>
<script>
const money=v=>new Intl.NumberFormat('zh-CN',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(v||0);const num=v=>new Intl.NumberFormat('zh-CN').format(v||0);let data,selected=0;
function esc(v){const d=document.createElement('div');d.textContent=v??'';return d.innerHTML}
function render(){const projects=data.projects||[];const p=projects[selected];const list=`<aside class="card"><b>项目 (${projects.length})</b>${projects.length?projects.map((x,i)=>`<button class="project ${i===selected?'active':''}" data-i="${i}"><b>${esc(x.name)}</b><br><span class="meta">${num(x.tokens)} tokens · ${money(x.cost)} · ${x.task_count} 工单</span></button>`).join(''):'<div class="empty">未发现 TASKS.md。配置 TOKDASH_PROJECT_ROOTS 后刷新。</div>'}</aside>`;if(!p){document.querySelector('#root').innerHTML=list+'<section class="card"><div class="empty">暂无项目数据</div></section>';return}const flow=p.tasks.map(t=>`<span class="step ${t.status==='Completed'?'done':t.status==='In progress'?'progress':''}">${esc(t.id)} · ${esc(t.status)}</span>`).join('')||'<span class="meta">尚无工单</span>';const tasks=p.tasks.map(t=>`<tr><td>${esc(t.id)}</td><td>${esc(t.title)}</td><td>${esc(t.status)}</td><td>${t.session_ids.length?num(t.tokens):'<span class="meta">未关联</span>'}</td><td>${t.session_ids.length?money(t.cost):'—'}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">暂无工单</td></tr>';const sessions=p.sessions.map(s=>`<tr><td title="${esc(s.session_id)}">${esc(s.display_name||s.session_id)}</td><td>${esc(s.model)}</td><td>${num(s.tokens)}</td><td>${money(s.cost)}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">尚无匹配会话。可在项目根目录 .tokdash-project.json 添加 aliases。</td></tr>';document.querySelector('#root').innerHTML=list+`<section class="card"><div class="top"><div><h2>${esc(p.name)}</h2><div class="meta">${esc(p.path)}</div></div><div><div class="metric">${num(p.tokens)} tokens</div><div class="meta">${money(p.cost)} · ${p.session_count} 会话</div></div></div><h3>业务流程 / 工单流</h3><div class="flow">${flow}</div><h3>工单（仅汇总明确关联的会话）</h3><table><thead><tr><th>ID</th><th>任务</th><th>状态</th><th>Token</th><th>成本</th></tr></thead><tbody>${tasks}</tbody></table><h3>关联会话（实测）</h3><table><thead><tr><th>会话</th><th>模型</th><th>Token</th><th>成本</th></tr></thead><tbody>${sessions}</tbody></table></section>`;document.querySelectorAll('.project').forEach(b=>b.onclick=()=>{selected=+b.dataset.i;render()})}
async function load(){document.querySelector('#root').innerHTML='<div class="card empty">正在加载…</div>';try{data=await fetch('/api/projects').then(r=>r.ok?r.json():Promise.reject(r.status));selected=Math.min(selected,(data.projects?.length||1)-1);render()}catch(e){document.querySelector('#root').innerHTML=`<div class="card empty">加载失败：${esc(e)}。请确认本机服务正在运行。</div>`}}document.querySelector('#refresh').onclick=load;load();
</script></body></html>
