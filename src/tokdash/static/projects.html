<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tokdash - 项目与工单</title><style>body{font:14px system-ui,"Microsoft YaHei",sans-serif;margin:0;background:#f8fafc;color:#0f172a}header,main{max-width:1280px;margin:auto;padding:20px}header{background:#fff;border-bottom:1px solid #e2e8f0}.top,.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.filters{padding:16px 0}.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px}.grid{display:grid;grid-template-columns:300px 1fr;gap:16px}.project{display:block;width:100%;text-align:left;border:0;background:transparent;padding:10px;border-radius:8px}.project.active,.project:hover{background:#eff6ff}button,select,input{font:inherit;padding:7px 9px;border:1px solid #cbd5e1;border-radius:7px;background:#fff}button{cursor:pointer}.badge{font-size:12px;padding:2px 6px;border-radius:99px}.ok{background:#dcfce7;color:#166534}.warn{background:#ffedd5;color:#9a3412}.closed{background:#e5e7eb;color:#374151}.stats{display:flex;gap:8px;flex-wrap:wrap}.metric{font-size:20px;font-weight:700}.muted{color:#64748b}.feedback{margin:10px 0;padding:8px;border-radius:7px;background:#eff6ff}.error-log{position:fixed;left:12px;bottom:12px;background:#b91c1c;color:#fff;border:0;border-radius:99px;padding:8px 12px}.empty{text-align:center;color:#64748b;padding:24px}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:8px;border-bottom:1px solid #e2e8f0;vertical-align:top}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><header><div class="top"><a href="/">← 返回 Tokdash</a><h1>项目 / 工单</h1></div><div class="muted">默认显示已接入项目；数据一次载入后在前端筛选。</div></header><main><div class="filters"><input id="query" placeholder="筛选项目名称"><select id="period"><option value="7">近 7 天</option><option value="30">近 30 天</option><option value="365" selected>历史 365 天</option></select><select id="state"><option value="all">全部状态</option><option value="managed">已接入</option><option value="unmanaged">未接入</option><option value="closed">已关闭</option></select><button id="toggleUnmanaged">显示全部</button><button id="toggleClosed">显示已关闭</button><button id="refresh">重新读取</button></div><div id="feedback"></div><div id="root" class="grid"><div class="card empty">正在读取项目…</div></div></main><script>
const $=id=>document.getElementById(id),fmt=n=>new Intl.NumberFormat('zh-CN').format(n||0),cash=n=>new Intl.NumberFormat('zh-CN',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n||0),esc=v=>{const x=document.createElement('span');x.textContent=v??'';return x.innerHTML};let data=null,selected='',showUnmanaged=false,showClosed=false,errors=[];
function feedback(text,error=false){$('feedback').innerHTML='<div class="feedback">'+esc(text)+'</div>';if(error){errors.unshift(new Date().toLocaleTimeString()+' '+text);let b=$('errorLog');if(!b){b=document.createElement('button');b.id='errorLog';b.className='error-log';b.textContent='错误日志';b.onclick=()=>feedback(errors.join('\n'));document.body.appendChild(b)}}}
function stateOf(p){return p.adoption_status==='已关闭'?'closed':p.managed?'managed':'unmanaged'}
function filtered(){const q=$('query').value.trim().toLowerCase(),s=$('state').value;return (data?.projects||[]).filter(p=>(showUnmanaged||p.managed||stateOf(p)==='closed')&&(showClosed||stateOf(p)!=='closed')&&(!q||p.name.toLowerCase().includes(q))&&(s==='all'||stateOf(p)===s))}
function render(){const items=filtered();if(!items.some(p=>p.name===selected))selected=items[0]?.name||'';const p=items.find(x=>x.name===selected);const list='<aside class="card"><b>项目列表</b>'+ (items.length?items.map(x=>'<button class="project '+(x.name===selected?'active':'')+'" data-name="'+esc(x.name)+'"><b>'+esc(x.name)+'</b> <span class="badge '+stateOf(x)+'">'+(x.adoption_status||stateOf(x))+'</span><br><span class="muted">'+fmt(x.tokens)+' Tokens · '+cash(x.cost)+'</span></button>').join(''):'<div class="empty">没有符合条件的项目</div>')+'</aside>';if(!p){$('root').innerHTML=list+'<section class="card empty">选择项目查看详情</section>';return}const e=p.efficiency||{},actions=stateOf(p)==='managed'?'<button id="reload">重新载入</button><button id="close">关闭接入</button>':stateOf(p)==='unmanaged'?'<button id="adopt">一键接入</button>':'';const tasks=stateOf(p)==='closed'?'<div class="empty">已关闭项目，工单已隐藏</div>':'<table><thead><tr><th>ID</th><th>任务</th><th>目标</th><th>状态</th><th>开始</th><th>完成</th><th>结果</th><th>返工</th><th>差评</th><th>Token</th><th>成本</th></tr></thead><tbody>'+(p.tasks||[]).map(t=>'<tr><td>'+esc(t.id)+'</td><td>'+esc(t.title)+'</td><td>'+esc(t.objective||'unavailable')+'</td><td>'+esc(t.status)+'</td><td>'+esc(t.started||'unavailable')+'</td><td>'+esc(t.completed||'unavailable')+'</td><td>'+esc(t.outcome||'unavailable')+'</td><td>'+esc(t.rework_count||'unavailable')+'</td><td>'+esc(t.negative_rating_count||'unavailable')+'</td><td>'+(t.tokens==null?'unavailable':fmt(t.tokens))+'</td><td>'+(t.cost==null?'unavailable':cash(t.cost))+'</td></tr>').join('')+'</tbody></table>';$('root').innerHTML=list+'<section class="card"><div class="top"><div><h2>'+esc(p.name)+' <span class="badge '+stateOf(p)+'">'+(p.adoption_status||stateOf(p))+'</span> '+actions+'</h2><div class="muted">'+esc(p.path||'无记录目录')+'</div></div><div class="metric">'+fmt(p.tokens)+' Tokens</div></div><h3>工单效率汇总</h3><div class="stats">'+[['任务数',e.task_count??0],['完成率',e.completion_rate==null?'unavailable':Math.round(e.completion_rate*100)+'%'],['用时',e.duration_minutes==null?'unavailable':e.duration_minutes+' 分钟'],['Token',e.tokens==null?'unavailable':fmt(e.tokens)],['成本',e.cost==null?'unavailable':cash(e.cost)],['返工',e.rework_count==null?'unavailable':e.rework_count],['差评',e.negative_rating_count==null?'unavailable':e.negative_rating_count]].map(x=>'<div class="card"><div class="muted">'+x[0]+'</div><div class="metric">'+x[1]+'</div></div>').join('')+'</div><h3>业务流程 / 工单</h3>'+tasks+'</section>';document.querySelectorAll('[data-name]').forEach(b=>b.onclick=()=>{selected=b.dataset.name;render()});const token=async()=> (await fetch('/api/csrf-token')).json().then(x=>x.token);const act=async(path,verb,success)=>{try{const r=await fetch(path,{method:verb,headers:{'Content-Type':'application/json','X-Tokdash-Token':await token()},body:JSON.stringify({path:p.path})});const text=await r.text();if(!r.ok)throw Error(r.status+' '+text);feedback(success);await load()}catch(err){feedback('操作失败：'+err,true)}};if($('reload'))$('reload').onclick=()=>act('/api/projects','GET','重新载入成功');if($('close'))$('close').onclick=()=>act('/api/projects/unadopt','POST','关闭接入成功');if($('adopt'))$('adopt').onclick=()=>act('/api/projects/adopt','POST','接入成功')}
async function load(){feedback('正在读取项目…');try{let r=await fetch('/api/projects?period='+$('period').value+'&include_unmanaged=true');let x=await r.json();while(x.loading){await new Promise(z=>setTimeout(z,300));x=await fetch('/api/projects/status?job='+encodeURIComponent(x.job)).then(r=>r.json());if(x.error)throw Error(x.error);x=x.data||x}data=x;render()}catch(e){feedback('读取失败：'+e,true)}}['query','state'].forEach(id=>$(id).oninput=render);$('toggleUnmanaged').onclick=()=>{showUnmanaged=!showUnmanaged;$('toggleUnmanaged').textContent=showUnmanaged?'隐藏未接入':'显示全部';render()};$('toggleClosed').onclick=()=>{showClosed=!showClosed;$('toggleClosed').textContent=showClosed?'隐藏已关闭':'显示已关闭';render()};$('period').onchange=load;$('refresh').onclick=load;load();</script></body></html>
