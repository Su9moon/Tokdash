<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tokdash · 项目与工单</title>
<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--card:#fff;--bg:#f8fafc;--accent:#2563eb;--good:#047857;--warn:#b45309}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif}header{padding:24px max(24px,calc((100vw - 1280px)/2));background:#fff;border-bottom:1px solid var(--line)}main{max-width:1280px;margin:auto;padding:24px}.top,.filters{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.back{color:var(--accent);text-decoration:none}.hint,.meta{color:var(--muted)}.filters{margin:20px 0}.filters input,.filters select,button{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}button{cursor:pointer}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}.label{font-size:12px;color:var(--muted)}.metric{font-size:20px;font-weight:700}.grid{display:grid;grid-template-columns:310px minmax(0,1fr);gap:20px;margin-top:20px}.project{width:100%;text-align:left;border:0;background:transparent;padding:12px;border-radius:8px}.project:hover,.project.active{background:#eff6ff}.badge{display:inline-block;border-radius:999px;padding:2px 7px;font-size:11px}.managed{background:#dcfce7;color:var(--good)}.unmanaged{background:#fff7ed;color:var(--warn)}table{width:100%;border-collapse:collapse}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:12px;color:var(--muted)}.empty{color:var(--muted);padding:28px;text-align:center}@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}table{font-size:12px}}
</style></head><body><header><div class="top"><div><a class="back" href="/">← 返回 Tokdash</a><h1>项目 / 工单</h1><p class="hint">所有历史 Codex 项目自动纳入；接入项目额外显示业务流程与工单。</p></div><button id="refresh">刷新</button></div></header><main><div class="filters"><input id="query" placeholder="筛选项目名称…"><select id="period"><option value="7">近 7 天</option><option value="30">近 30 天</option><option value="365" selected>历史 365 天</option></select><select id="state"><option value="all">全部状态</option><option value="managed">已接入工单</option><option value="unmanaged">未接入工单</option></select><select id="model"><option value="all">全部模型</option></select><button id="toggleUnmanaged" type="button">显示全部项目</button></div><div id="stats" class="stats"></div><div id="root" class="grid"><div class="card empty">正在读取项目…</div></div></main>
<script>document.getElementById('root').innerHTML='<div class="card empty"><progress id="loadProgress" max="100"></progress><div>正在读取项目，请稍候…</div></div>';
const fmt=n=>new Intl.NumberFormat('zh-CN').format(n||0),cash=n=>new Intl.NumberFormat('zh-CN',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n||0),esc=v=>{const x=document.createElement('div');x.textContent=v??'';return x.innerHTML};let data,selected='',showAll=false;
function filtered(){const q=query.value.trim().toLowerCase(),s=state.value,m=model.value;return data.projects.filter(p=>(showAll||p.managed)&&(!q||p.name.toLowerCase().includes(q))&&(s==='all'||(p.managed?'managed':'unmanaged')===s)&&(m==='all'||p.sessions.some(x=>x.model===m)))}
function render(){const items=filtered();if(!items.some(x=>x.name===selected))selected=items[0]?.name||'';const p=items.find(x=>x.name===selected);const tokens=items.reduce((n,x)=>n+x.tokens,0),cost=items.reduce((n,x)=>n+x.cost,0),sessions=items.reduce((n,x)=>n+x.session_count,0),managed=items.filter(x=>x.managed).length;stats.innerHTML=[['项目',items.length],['已接入',managed],['会话',sessions],['Token',fmt(tokens)],['成本',cash(cost)]].map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="metric">${x[1]}</div></div>`).join('');const list=`<aside class="card"><b>项目列表</b>${items.length?items.map(x=>`<button class="project ${x.name===selected?'active':''}" data-name="${esc(x.name)}"><b>${esc(x.name)}</b> <span class="badge ${x.managed?'managed':'unmanaged'}">${x.managed?'已接入':'未接入'}</span><br><span class="meta">${fmt(x.tokens)} Tokens · ${cash(x.cost)} · ${x.session_count} 会话</span></button>`).join(''):'<div class="empty">没有符合筛选条件的项目</div>'}</aside>`;if(!p){root.innerHTML=list+'<section class="card empty">选择项目查看详情</section>';return}const tasks=p.tasks.map(t=>`<tr><td>${esc(t.id)}</td><td>${esc(t.title)}</td><td>${esc(t.status)}</td><td>${t.tokens===null?'待快照':fmt(t.tokens)}</td><td>${t.cost===null?'—':cash(t.cost)}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">未接入项目尚无工单；在项目根目录创建 TASKS.md 后即可接入。</td></tr>';const rows=p.sessions.map(x=>`<tr><td>${esc(x.display_name||x.session_id)}</td><td>${esc(x.model)}</td><td>${fmt(x.tokens)}</td><td>${cash(x.cost)}</td></tr>`).join('');root.innerHTML=list+`<section class="card"><div class="top"><div><h2>${esc(p.name)} <span class="badge ${p.managed?'managed':'unmanaged'}">${p.managed?'已接入':'未接入'}</span> ${!p.managed&&p.path?'<button id="adopt">一键接入</button>':'}</h2><div class="meta">${esc(p.path||'Tokdash 会话自动发现；手动指定项目目录后可接入工单。')}</div></div><div><div class="metric">${fmt(p.tokens)} Tokens</div><div class="meta">${cash(p.cost)} · ${p.session_count} 会话</div></div></div><h3>业务流程 / 工单</h3><table><thead><tr><th>ID</th><th>任务</th><th>状态</th><th>开始</th><th>完成</th><th>用时</th><th>Token</th><th>成本</th></tr></thead><tbody>${tasks}</tbody></table><h3>会话明细（实测）</h3><table><thead><tr><th>会话</th><th>模型</th><th>Token</th><th>成本</th></tr></thead><tbody>${rows}</tbody></table></section>`;document.querySelectorAll('[data-name]').forEach(b=>b.onclick=()=>{selected=b.dataset.name;render()})}
async function load(){root.innerHTML='<div class="card empty">正在读取项目文件，请稍候…</div>';try{data=await fetch('/api/projects?period='+period.value+'&include_unmanaged='+(showAll?'true':'false')).then(r=>r.json());const models=[...new Set(data.projects.flatMap(p=>p.sessions.map(s=>s.model)).filter(Boolean))];model.innerHTML='<option value="all">全部模型</option>'+models.map(x=>`<option>${esc(x)}</option>`).join('');render()}catch(e){root.innerHTML='<div class="card empty">加载失败：'+esc(e)+'</div>'}}toggleUnmanaged.onclick=()=>{showAll=!showAll;toggleUnmanaged.textContent=showAll?'隐藏未接入':'显示全部项目';render()} ; [query,state,model].forEach(x=>x.oninput=render);period.onchange=load;refresh.onclick=load;load();
</script></body></html>
