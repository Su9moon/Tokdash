<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tokdash · 项目与工单</title>
<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--card:#fff;--bg:#f8fafc;--accent:#2563eb;--good:#047857;--warn:#b45309;--closed:#64748b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif;overflow-x:auto}header{padding:24px max(24px,calc((100vw - 1280px)/2));background:#fff;border-bottom:1px solid var(--line)}main{width:max(1280px,calc(100vw - 48px));max-width:none;margin:auto;padding:24px}.top,.filters{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.back{color:var(--accent);text-decoration:none}.hint,.meta{color:var(--muted)}.filters{margin:20px 0}.filters input,.filters select,button{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}button{cursor:pointer}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}.label{font-size:12px;color:var(--muted)}.metric{font-size:20px;font-weight:700}.grid{display:grid;grid-template-columns:310px minmax(0,1fr);gap:20px;margin-top:20px}.project{width:100%;text-align:left;border:0;background:transparent;padding:12px;border-radius:8px}.project:hover,.project.active{background:#eff6ff}.badge{display:inline-block;border-radius:999px;padding:2px 7px;font-size:11px}.managed{background:#dcfce7;color:var(--good)}.unmanaged{background:#fff7ed;color:var(--warn)}.closed{background:#e2e8f0;color:var(--closed)}table{width:100%;min-width:1180px;border-collapse:collapse;margin:8px 0 20px}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:12px;color:var(--muted)}.empty{color:var(--muted);padding:28px;text-align:center}.feedback{color:var(--good);margin-top:8px}.feedback.error{color:#b91c1c}.readonly{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#f8fafc;color:var(--muted);font-size:12px}@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}table{font-size:12px}}
</style></head><body><header><div class="top"><div><a class="back" href="/">← 返回 Tokdash</a><h1>项目 / 工单</h1><p class="hint">所有历史 Codex 项目自动纳入；接入项目额外显示业务流程与工单。</p></div><button id="refresh">刷新</button></div></header><main><div class="filters"><input id="query" placeholder="筛选项目名称…"><select id="period"><option value="7">近 7 天</option><option value="30">近 30 天</option><option value="365" selected>历史 365 天</option></select><select id="state"><option value="all">全部状态</option><option value="managed">已接入</option><option value="unmanaged">未接入</option><option value="closed">已关闭</option></select><select id="model"><option value="all">全部模型</option></select><button id="toggleUnmanaged" type="button">隐藏未接入</button><button id="toggleClosed" type="button">隐藏已关闭</button></div><div id="stats" class="stats"></div><div id="root" class="grid"><div class="card empty">正在读取项目…</div></div></main>
<script>
const uiErrors=[];const closedKey='tokdash.closed-projects';let data={projects:[]},selected='';let hideUnmanaged=true,hideClosed=true;
const $=id=>document.getElementById(id),fmt=n=>n==null?'-':new Intl.NumberFormat('zh-CN').format(n),cash=n=>n==null?'-':new Intl.NumberFormat('zh-CN',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n),esc=v=>{const x=document.createElement('div');x.textContent=v==null?'':String(v);return x.innerHTML},missing=v=>v==null||v===''||v==='unavailable'?' - ':esc(v),closedPaths=()=>{try{return new Set(JSON.parse(localStorage.getItem(closedKey)||'[]'))}catch{return new Set()}};
function reportError(message,details=''){uiErrors.unshift({time:new Date().toLocaleTimeString(),message,details});let b=$('errorButton');if(!b){b=document.createElement('button');b.id='errorButton';b.textContent='错误日志';b.style='position:fixed;left:16px;bottom:16px;z-index:20;background:#b91c1c;color:white;border:0;border-radius:999px;padding:8px 12px';b.onclick=()=>{const box=$('errorLog');box.hidden=!box.hidden;box.textContent=uiErrors.map(x=>`[${x.time}] ${x.message}\n${x.details}`).join('\n\n')};document.body.appendChild(b)} }
function baseStatusOf(p){return p.managed?'managed':'unmanaged'}
function statusOf(p){if(closedPaths().has(p.path))return'closed';return baseStatusOf(p)}
function filtered(){const q=$('query').value.trim().toLowerCase(),s=$('state').value,m=$('model').value;return data.projects.filter(p=>{const st=statusOf(p);return(!hideUnmanaged||st!=='unmanaged')&&(!hideClosed||st!=='closed')&&(!q||p.name.toLowerCase().includes(q))&&(s==='all'||st===s)&&(m==='all'||p.sessions.some(x=>x.model===m))})}
function taskCell(v){return v==null||v===''||v==='unavailable'?'-':esc(v)}
function durationCell(t){if(t.duration_seconds!=null)return t.duration_seconds<60?`${t.duration_seconds} 秒`:`${t.duration_minutes} 分钟`;return taskCell(t.duration_minutes)}
function render(){const items=filtered();if(!items.some(x=>x.name===selected))selected=items[0]?.name||'';const p=items.find(x=>x.name===selected);const tokens=items.reduce((n,x)=>n+(x.tokens||0),0),cost=items.reduce((n,x)=>n+(x.cost||0),0),sessions=items.reduce((n,x)=>n+(x.session_count||0),0),managed=items.filter(x=>statusOf(x)==='managed').length;$("stats").innerHTML=[['项目',items.length],['已接入',managed],['会话',sessions],['Token',fmt(tokens)],['成本',cash(cost)],['已关闭',items.filter(x=>statusOf(x)==='closed').length]].map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="metric">${x[1]}</div></div>`).join('');const list=`<aside class="card"><b>项目列表</b>${items.length?items.map(x=>{const st=statusOf(x),label=st==='managed'?'已接入':st==='closed'?'已关闭':'未接入';return`<button class="project ${x.name===selected?'active':''}" data-name="${esc(x.name)}"><b>${esc(x.name)}</b> <span class="badge ${st}">${label}</span><br><span class="meta">${fmt(x.tokens)} Tokens · ${cash(x.cost)} · ${x.session_count||0} 会话</span></button>`}).join(''):'<div class="empty">没有符合筛选条件的项目</div>'}</aside>`;if(!p){$('root').innerHTML=list+'<section class="card empty">选择项目查看详情</section>';return}const st=statusOf(p),label=st==='managed'?'已接入':st==='closed'?'已关闭':'未接入';const tasks=(p.tasks||[]).map(t=>`<tr><td>${taskCell(t.id)}</td><td>${taskCell(t.title)}</td><td>${taskCell(t.objective)}</td><td>${taskCell(t.status)}</td><td>${taskCell(t.started)}</td><td>${taskCell(t.completed)}</td><td>${durationCell(t)}</td><td>${taskCell(t.rework_count)}</td><td>${taskCell(t.negative_rating_count)}</td><td>${t.tokens==null?'-':fmt(t.tokens)}</td><td>${t.token_events==null?'-':fmt(t.token_events)}</td><td>${t.cost==null?'-':cash(t.cost)}</td></tr>`).join('')||'<tr><td colspan="12" class="empty">暂无工单数据</td></tr>';const rows=(p.sessions||[]).map(x=>`<tr><td>${esc(x.display_name||x.session_id)}</td><td>${esc(x.model||'-')}</td><td>${fmt(x.tokens)}</td><td>${cash(x.cost)}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">暂无会话</td></tr>';const e=p.efficiency||{};const metric=(k,v)=>`<div class="card"><div class="label">${k}</div><div class="metric">${v==null||v==='unavailable'?'-':v}</div></div>`;$('root').innerHTML=list+`<section class="card"><div class="top"><div><h2>${esc(p.name)} <span class="badge ${st}">${label}</span> ${st==='managed'?'<button id="reloadProject">重新载入</button><button id="toggleClosedProject">关闭接入</button>':st==='unmanaged'?'<button id="toggleClosedProject">关闭接入</button>':st==='closed'?'<button id="toggleClosedProject">恢复接入</button>':''}</h2><div class="meta">${esc(p.path||'Tokdash 会话自动发现；未接入项目请在 Codex 对话中启用 save-tokens。')}</div><div class="readonly">启用 / SAVE-TOKENS：请在 Codex 对话中启用 save-tokens skill</div><div id="feedback" class="feedback"></div></div><div><div class="metric">${fmt(p.tokens)} Tokens</div><div class="meta">${cash(p.cost)} · ${p.session_count||0} 会话</div></div></div><h3>工单效率汇总</h3><div class="stats">${metric('任务数',e.task_count??0)}${metric('完成率',e.completion_rate==null?'-':Math.round(e.completion_rate*100)+'%')}${metric('总用时',e.duration_minutes==null?'-':e.duration_minutes+' 分钟')}${metric('Token',e.tokens==null?'-':fmt(e.tokens))}${metric('成本',e.cost==null?'-':cash(e.cost))}${metric('返工',e.rework_count==null?'-':e.rework_count)}${metric('差评',e.negative_rating_count==null?'-':e.negative_rating_count)}</div><h3>业务流程 / 工单</h3><table><thead><tr><th>ID</th><th>任务</th><th>目标</th><th>状态</th><th>开始</th><th>完成</th><th>用时</th><th>返工</th><th>差评</th><th>Token</th><th>Token events</th><th>成本</th></tr></thead><tbody>${tasks}</tbody></table><h3>会话明细（实测）</h3><table><thead><tr><th>会话</th><th>模型</th><th>Token</th><th>成本</th></tr></thead><tbody>${rows}</tbody></table></section>`;document.querySelectorAll('[data-name]').forEach(b=>b.onclick=()=>{selected=b.dataset.name;render()});const fb=(msg,err=false)=>{const x=$('feedback');if(x){x.textContent=msg;x.className='feedback'+(err?' error':'')}};const reload=$('reloadProject');if(reload)reload.onclick=async()=>{fb('正在重新载入…');try{await load();fb('重新载入完成')}catch(err){fb('重新载入失败：'+err,true);reportError('重新载入失败',String(err))}};const toggle=$('toggleClosedProject');if(toggle)toggle.onclick=()=>{const paths=closedPaths();if(st==='closed')paths.delete(p.path);else paths.add(p.path);localStorage.setItem(closedKey,JSON.stringify([...paths]));render()}}
async function load(refresh=false){ $('root').innerHTML='<div class="card empty"><progress></progress><div>正在读取项目，请稍候…</div></div>';try{let r=await fetch('/api/projects?period='+$('period').value+'&include_unmanaged=true'+(refresh?'&refresh=true':''));let result=await r.json();while(result.loading){const s=await fetch('/api/projects/status?job='+encodeURIComponent(result.job)).then(x=>x.json());if(s.error)throw new Error(s.error);if(s.loading){await new Promise(x=>setTimeout(x,300));continue}result=s.data;break}data=result;const models=[...new Set(data.projects.flatMap(p=>(p.sessions||[]).map(s=>s.model)).filter(Boolean))];$('model').innerHTML='<option value="all">全部模型</option>'+models.map(x=>`<option>${esc(x)}</option>`).join('');render()}catch(e){reportError('项目读取失败',String(e));$('root').innerHTML='<div class="card empty">加载失败：'+esc(e)+'</div>'}}
$('toggleUnmanaged').onclick=()=>{hideUnmanaged=!hideUnmanaged;$('toggleUnmanaged').textContent=hideUnmanaged?'隐藏未接入':'显示未接入';render()};$('toggleClosed').onclick=()=>{hideClosed=!hideClosed;$('toggleClosed').textContent=hideClosed?'隐藏已关闭':'显示已关闭';render()};['query','state','model'].forEach(id=>$(id).oninput=render);$('period').onchange=()=>load(true);$('refresh').onclick=()=>load(true);load();
</script><pre id="errorLog" hidden style="position:fixed;left:16px;bottom:58px;max-width:600px;max-height:40vh;overflow:auto;background:#111827;color:#f8fafc;padding:12px;border-radius:8px;z-index:19;white-space:pre-wrap"></pre></body></html>
